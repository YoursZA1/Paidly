# Secret scanning: custom patterns + TruffleHog history scan.
# Enable GitHub "Secret scanning" in repo Settings → Code security (see docs/SECRETS_AND_ENV.md).

name: Security — secrets

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-secrets:
    name: npm run scan-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Custom patterns (committed source)
        run: npm run scan-secrets

  trufflehog:
    name: TruffleHog (git history & files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.88.4
        with:
          path: ./
          extra_args: --only-verified
