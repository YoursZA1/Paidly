# Supabase project configuration (used by Supabase CLI).
# Remote project (link): npx supabase@latest link --project-ref fvxtsbnzadvuttoqcipo
# Then deploy functions: supabase functions deploy payfast-itn

project_id = "paidly"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Require email confirmation before sign-in (use Inbucket in local CLI for test emails).
enable_confirmations = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"

# Global verify_jwt removed: newer Supabase CLI expects per-function [functions.<name>] or map.
# To set verify_jwt per function, add e.g.:
#   [functions.payfast-itn]
#   verify_jwt = false

# Called with shared secret (Database Webhook / scripts), not end-user JWT.
[functions.purge-user-storage]
verify_jwt = false
